<!DOCTYPE html>
<html>
<head>
    <title>Test Buttons</title>
    <style>
        .btn { 
            padding: 10px 20px; 
            margin: 10px;
            cursor: pointer;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .btn:hover { background: #005a9e; }
    </style>
</head>
<body>
    <h2>Test Submit & End Exam Buttons</h2>
    <button class="btn" onclick="alert('Submit Quiz clicked!')">Nộp bài</button>
    <button class="btn" onclick="alert('End Exam clicked!')">Kết thúc thi</button>
    
    <h3>Checking actual website buttons:</h3>
    <div id="output"></div>
    
    <script>
        // Test if submitQuiz function exists
        setTimeout(() => {
            const output = document.getElementById('output');
            const issues = [];
            
            // Check submit button
            const submitBtn = document.getElementById('submit-btn');
            if (!submitBtn) issues.push('❌ submit-btn không tìm thấy');
            
            output.innerHTML = issues.length ? 
                issues.join('<br>') : 
                '✅ Buttons test OK. Mở index.html để kiểm tra!';
        }, 100);
    </script>
</body>
</html>
